<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>GeoCatch 3D — TPP + GPS</title>
<style>
  :root{
    --ink:#12303a; --panel:#fdf8ee; --panel-2:#f2e9d6;
    --accent:#ff6b5e; --accent-2:#2fb6a3; --gold:#f5b93c;
    --shadow:0 6px 0 rgba(18,48,58,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0b1f26;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;color:var(--ink);}
  #gl{position:fixed;inset:0;touch-action:none;}
  #encCv{position:fixed;inset:0;z-index:15;display:none;touch-action:none;}

  .hud{position:fixed;pointer-events:none;z-index:10;}
  #gpsPill{top:calc(12px + env(safe-area-inset-top));right:12px;pointer-events:auto;
    background:var(--panel);border:3px solid var(--ink);border-radius:999px;
    padding:8px 14px;font-size:12px;font-weight:bold;box-shadow:var(--shadow);cursor:pointer;
    display:flex;align-items:center;gap:7px;}
  #gpsDot{width:10px;height:10px;border-radius:50%;background:#b9b9b9;flex:none;}
  #gpsDot.live{background:#3ccb5a;box-shadow:0 0 0 4px rgba(60,203,90,.25);}
  #gpsDot.wait{background:var(--gold);animation:blink 1s infinite;}
  #gpsDot.err{background:var(--accent);}
  @keyframes blink{50%{opacity:.3}}
  #gpsDiag{top:calc(58px + env(safe-area-inset-top));right:12px;max-width:230px;
    background:rgba(18,48,58,.82);color:#fdf8ee;border-radius:12px;padding:8px 12px;
    font-size:10px;line-height:1.5;display:none;pointer-events:auto;white-space:pre-line;}

  .fab{width:56px;height:56px;border-radius:16px;background:var(--panel);
    border:3px solid var(--ink);box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .08s;
    position:relative;flex-direction:column;}
  .fab:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(18,48,58,.18);}
  .fab em{font-style:normal;font-size:20px;line-height:1;margin-bottom:8px;}
  .fab span{font-size:9px;font-weight:bold;position:absolute;bottom:4px;letter-spacing:.5px;}

  #joy{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));left:22px;width:118px;height:118px;border-radius:50%;
    background:rgba(253,248,238,.28);border:3px solid rgba(253,248,238,.5);z-index:11;touch-action:none;}
  #knob{position:absolute;left:50%;top:50%;width:52px;height:52px;border-radius:50%;
    background:var(--panel);border:3px solid var(--ink);transform:translate(-50%,-50%);box-shadow:var(--shadow);}

  #toast{position:fixed;top:calc(76px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-8px);
    background:var(--ink);color:#fff;font-size:13px;font-weight:bold;padding:9px 18px;
    border-radius:999px;opacity:0;transition:all .25s;z-index:60;pointer-events:none;max-width:86vw;text-align:center;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  #encUI{position:fixed;inset:0;z-index:20;display:none;pointer-events:none;}
  #encUI.on{display:block;}
  #encTop{position:absolute;top:calc(12px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    background:rgba(253,248,238,.95);border:3px solid var(--ink);border-radius:999px;
    padding:7px 20px;font-weight:bold;font-size:14px;box-shadow:var(--shadow);white-space:nowrap;}
  #runBtn{position:absolute;top:calc(12px + env(safe-area-inset-top));left:12px;pointer-events:auto;}
  #ballBtn{position:absolute;bottom:calc(18px + env(safe-area-inset-bottom));right:14px;pointer-events:auto;}
  #encHint{position:absolute;bottom:calc(16px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    color:rgba(255,255,255,.9);font-size:12px;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,.4);white-space:nowrap;}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="encCv"></canvas>

<div class="hud" id="gpsPill"><div id="gpsDot"></div><span id="gpsTxt">GPS: tap to start</span></div>
<div class="hud" id="gpsDiag"></div>

<div id="joy"><div id="knob"></div></div>
<div id="toast"></div>

<div id="encUI">
  <div id="encTop">Wild —</div>
  <div class="fab" id="runBtn"><em>🏃</em><span>RUN</span></div>
  <div class="fab" id="ballBtn"><em>◐</em><span id="ballBtnLbl">×20</span></div>
  <div id="encHint">Flick the ball up to throw — time the ring!</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="GLTFLoader.js"></script>
<script>
"use strict";
/* ============================================================
   GeoCatch 3D — third-person world + real GPS movement
   - three.js TPP camera (drag to orbit, pinch/wheel to zoom)
   - Geolocation watchPosition drives the avatar (1 unit = 1 m)
   - Joystick/WASD fallback when GPS is off or denied
   - Chunked procedural terrain, billboard creatures
   - Encounter/catch system on a 2D overlay canvas
============================================================ */

const TAU = Math.PI*2;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const dist2=(x1,z1,x2,z2)=>Math.hypot(x2-x1,z2-z1);
const rand=(a,b)=>a+Math.random()*(b-a);
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];

function hash2(x,y){ let h=Math.sin(x*127.1+y*311.7)*43758.5453; return h-Math.floor(h); }
function noise(x,y){
  const xi=Math.floor(x), yi=Math.floor(y), xf=x-xi, yf=y-yi;
  const u=xf*xf*(3-2*xf), v=yf*yf*(3-2*yf);
  return lerp(lerp(hash2(xi,yi),hash2(xi+1,yi),u), lerp(hash2(xi,yi+1),hash2(xi+1,yi+1),u), v);
}
function fbm(x,y){ return noise(x,y)*0.6 + noise(x*2.3,y*2.3)*0.25 + noise(x*5.1,y*5.1)*0.15; }

/* ---------------- species (original creatures) ---------------- */
const SPECIES = [
  {id:'leafling', name:'Leafling', type:'Grass',  color:'#79c267', accent:'#3f8f3d', shape:'round', deco:'leaf',   rarity:3, catchRate:.55, fleeRate:.08, cp:[60,240],  biome:'land'},
  {id:'cindpup',  name:'Cindpup',  type:'Ember',  color:'#f08a4b', accent:'#c8502a', shape:'tall',  deco:'flame',  rarity:3, catchRate:.50, fleeRate:.10, cp:[70,260],  biome:'land'},
  {id:'dribble',  name:'Dribble',  type:'Water',  color:'#5fb7e8', accent:'#2c7fb8', shape:'drop',  deco:'fin',    rarity:3, catchRate:.50, fleeRate:.10, cp:[70,260],  biome:'water'},
  {id:'whiffle',  name:'Whiffle',  type:'Wind',   color:'#cfd8e3', accent:'#8fa3b8', shape:'round', deco:'wing',   rarity:3, catchRate:.55, fleeRate:.18, cp:[50,220],  biome:'land'},
  {id:'buzzbit',  name:'Buzzbit',  type:'Spark',  color:'#f5d33c', accent:'#c99a12', shape:'wide',  deco:'bolt',   rarity:2, catchRate:.40, fleeRate:.15, cp:[110,340], biome:'land'},
  {id:'pebblo',   name:'Pebblo',   type:'Stone',  color:'#a89a8c', accent:'#6e6257', shape:'wide',  deco:'rock',   rarity:2, catchRate:.40, fleeRate:.08, cp:[120,360], biome:'land'},
  {id:'thornhog', name:'Thornhog', type:'Bramble',color:'#8a6f4d', accent:'#4d7a3a', shape:'wide',  deco:'spikes', rarity:2, catchRate:.35, fleeRate:.10, cp:[130,380], biome:'land'},
  {id:'moondrop', name:'Moondrop', type:'Mystic', color:'#a58ce0', accent:'#6a4fb8', shape:'drop',  deco:'star',   rarity:1, catchRate:.25, fleeRate:.20, cp:[200,520], biome:'land'},
  {id:'glacequin',name:'Glacequin',type:'Frost',  color:'#bfe8f2', accent:'#5aa8c9', shape:'tall',  deco:'crystal',rarity:1, catchRate:.20, fleeRate:.22, cp:[220,560], biome:'water'},
  {id:'auroryx',  name:'Auroryx',  type:'Aurora', color:'#ff9fb8', accent:'#7ad0c0', shape:'tall',  deco:'horn',   rarity:0, catchRate:.10, fleeRate:.28, cp:[400,900], biome:'any'},
];
const RARITY_W = {3:60, 2:26, 1:12, 0:2};

/* ---------------- 2D creature painter (sprites, dex, encounter) ---------------- */
function drawCreature(g, sp, size, t, hop){
  const s=size, bob=Math.sin(t*3)*s*0.04+(hop||0);
  g.save(); g.translate(0,-bob);
  let bw=s,bh=s;
  if(sp.shape==='tall'){bw=s*0.8;bh=s*1.15;}
  if(sp.shape==='wide'){bw=s*1.15;bh=s*0.85;}
  g.fillStyle=sp.color; g.strokeStyle='#12303a'; g.lineWidth=Math.max(2,s*0.06);
  g.beginPath();
  if(sp.shape==='drop'){
    g.moveTo(0,-bh*1.15);
    g.bezierCurveTo(bw*0.75,-bh*0.75,bw*0.6,0,0,0);
    g.bezierCurveTo(-bw*0.6,0,-bw*0.75,-bh*0.75,0,-bh*1.15);
  } else { g.ellipse(0,-bh*0.5,bw*0.52,bh*0.52,0,0,TAU); }
  g.fill(); g.stroke();
  g.fillStyle='rgba(255,255,255,.45)';
  g.beginPath(); g.ellipse(0,-bh*0.32,bw*0.3,bh*0.26,0,0,TAU); g.fill();
  g.fillStyle=sp.accent; g.strokeStyle='#12303a';
  const topY = sp.shape==='drop' ? -bh*1.1 : -bh*0.98;
  g.beginPath();
  switch(sp.deco){
    case 'leaf': g.ellipse(bw*0.05,topY-s*0.12,s*0.2,s*0.09,-0.6,0,TAU); g.fill(); g.stroke(); break;
    case 'flame': g.moveTo(0,topY-s*0.32); g.quadraticCurveTo(s*0.16,topY-s*0.1,0,topY+s*0.02);
      g.quadraticCurveTo(-s*0.16,topY-s*0.1,0,topY-s*0.32); g.fill(); g.stroke(); break;
    case 'fin': g.moveTo(0,topY-s*0.22); g.lineTo(s*0.14,topY+s*0.04); g.lineTo(-s*0.14,topY+s*0.04);
      g.closePath(); g.fill(); g.stroke(); break;
    case 'wing': g.ellipse(-bw*0.55,-bh*0.55,s*0.18,s*0.09,0.5,0,TAU); g.fill(); g.stroke();
      g.beginPath(); g.ellipse(bw*0.55,-bh*0.55,s*0.18,s*0.09,-0.5,0,TAU); g.fill(); g.stroke(); break;
    case 'bolt': g.moveTo(-s*0.04,topY-s*0.26); g.lineTo(s*0.08,topY-s*0.08); g.lineTo(0,topY-s*0.08);
      g.lineTo(s*0.1,topY+s*0.06); g.lineTo(-s*0.06,topY-s*0.04); g.lineTo(s*0.02,topY-s*0.04);
      g.closePath(); g.fill(); g.stroke(); break;
    case 'rock': g.moveTo(-s*0.14,topY+s*0.04); g.lineTo(-s*0.05,topY-s*0.14); g.lineTo(s*0.08,topY-s*0.1);
      g.lineTo(s*0.14,topY+s*0.04); g.closePath(); g.fill(); g.stroke(); break;
    case 'spikes': for(let i=-1;i<=1;i++){ g.moveTo(i*s*0.16-s*0.06,topY+s*0.06);
      g.lineTo(i*s*0.16,topY-s*0.14); g.lineTo(i*s*0.16+s*0.06,topY+s*0.06);} g.fill(); g.stroke(); break;
    case 'star':{ const cy0=topY-s*0.14,r1=s*0.14,r2=s*0.055;
      for(let i=0;i<10;i++){ const r=i%2?r2:r1,a=i/10*TAU-Math.PI/2;
        const px=Math.cos(a)*r,py=cy0+Math.sin(a)*r; i?g.lineTo(px,py):g.moveTo(px,py); }
      g.closePath(); g.fill(); g.stroke(); break; }
    case 'crystal': g.moveTo(0,topY-s*0.3); g.lineTo(s*0.09,topY-s*0.06); g.lineTo(0,topY+s*0.04);
      g.lineTo(-s*0.09,topY-s*0.06); g.closePath(); g.fill(); g.stroke(); break;
    case 'horn': g.moveTo(-s*0.03,topY+s*0.02); g.quadraticCurveTo(s*0.02,topY-s*0.3,s*0.16,topY-s*0.36);
      g.quadraticCurveTo(s*0.05,topY-s*0.16,s*0.07,topY+s*0.04); g.closePath(); g.fill(); g.stroke(); break;
  }
  const eyeY=-bh*0.62;
  g.fillStyle='#12303a';
  g.beginPath(); g.arc(-bw*0.18,eyeY,s*0.05,0,TAU); g.arc(bw*0.18,eyeY,s*0.05,0,TAU); g.fill();
  g.fillStyle='#fff';
  g.beginPath(); g.arc(-bw*0.18+s*0.015,eyeY-s*0.015,s*0.016,0,TAU); g.arc(bw*0.18+s*0.015,eyeY-s*0.015,s*0.016,0,TAU); g.fill();
  g.fillStyle='rgba(255,120,120,.55)';
  g.beginPath(); g.ellipse(-bw*0.3,eyeY+s*0.12,s*0.05,s*0.03,0,0,TAU);
  g.ellipse(bw*0.3,eyeY+s*0.12,s*0.05,s*0.03,0,0,TAU); g.fill();
  g.strokeStyle='#12303a'; g.lineWidth=Math.max(1.5,s*0.03);
  g.beginPath(); g.arc(0,eyeY+s*0.1,s*0.06,0.2,Math.PI-0.2); g.stroke();
  g.restore();
}
function creatureTexture(sp){
  const c=document.createElement('canvas'); c.width=c.height=256;
  const g=c.getContext('2d'); g.translate(128,236);
  drawCreature(g,sp,150,0,0);
  const tex=new THREE.CanvasTexture(c); tex.anisotropy=4;
  return tex;
}

/* ---------------- game state ---------------- */
const game = {
  screen:'map', xp:0, level:1, dust:0,
  balls:{normal:20, great:5, ultra:2},
  ballOrder:['normal','great','ultra'], selBall:'normal',
  caught:{}, seen:{}, spawns:[], toastTimer:null,
};
const BALLS = {
  normal:{name:'Field Ball', mult:1.0, color:'#ff6b5e'},
  great: {name:'Grand Ball', mult:1.5, color:'#4f9de8'},
  ultra: {name:'Astral Ball',mult:2.0, color:'#f5b93c'},
};
const xpNeed = lv => 800 + (lv-1)*450;
const INTERACT_RANGE = 60;   // metres, like GO's encounter reach

function toast(msg,ms){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(game.toastTimer);
  game.toastTimer=setTimeout(()=>t.classList.remove('show'), ms||2400);
}
function grantXP(n){
  game.xp+=n;
  while(game.xp>=xpNeed(game.level)){
    game.xp-=xpNeed(game.level); game.level++;
    game.balls.normal+=10; game.balls.great+=3; if(game.level%5===0) game.balls.ultra+=2;
    toast(`Level up! Trainer Lv ${game.level} — balls restocked 🎉`, 2800);
  }
  refreshHUD();
}
function refreshHUD(){} // trainer card removed from UI; XP/level still tracked internally

/* ---------------- three.js scene ---------------- */
const glCv = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({canvas:glCv, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xbfe6f2);
scene.fog = new THREE.Fog(0xe0f2ec, 130, 420); // greenish haze so the map melts into the horizon like GO

const camera = new THREE.PerspectiveCamera(55, 1, 0.5, 600); // near=0.5: depth precision for thin road layers
function onResize(){
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  sizeEncCv();
}
window.addEventListener('resize', onResize);

scene.add(new THREE.HemisphereLight(0xeef7ff, 0x6a8f5a, 0.95));
const sun = new THREE.DirectionalLight(0xfff2d8, 0.8);
sun.position.set(40,80,20); scene.add(sun);

/* ============ world: real streets from OpenStreetMap, GO art style ============ */
const WORLD_COL = {
  green:0xa8e88f, forest:0x7cc96e, building:0x9fe093,
  water:0x66c9de, roadCase:0xf2ef6d, road:0x3e6b80,
};
// default anchor (Bengaluru) until the first GPS fix re-anchors the world
let worldAnchor={lat:12.9752,lng:77.6068};
let anchorGen=0;
function llToLocal(lat,lng){
  const x=(lng-worldAnchor.lng)*Math.cos(worldAnchor.lat*Math.PI/180)*111320;
  const z=-(lat-worldAnchor.lat)*110540;
  return {x:x+24, z:z+24};
}
function localToLatLng(x,z){
  return {lat: worldAnchor.lat-(z-24)/110540,
          lng: worldAnchor.lng+(x-24)/(Math.cos(worldAnchor.lat*Math.PI/180)*111320)};
}

/* sky dome + horizon gradient */
const sky=new THREE.Mesh(
  new THREE.SphereGeometry(480,24,12),
  new THREE.ShaderMaterial({side:THREE.BackSide, depthWrite:false, fog:false,
    uniforms:{top:{value:new THREE.Color(0x3fa9e8)}, bot:{value:new THREE.Color(0xe8f6f9)}},
    vertexShader:'varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader:'varying vec3 vP;uniform vec3 top;uniform vec3 bot;void main(){float t=smoothstep(0.0,0.38,normalize(vP).y);gl_FragColor=vec4(mix(bot,top,t),1.0);}'})
);
sky.renderOrder=-10; scene.add(sky);

/* clouds: soft billboard sprites on a far ring */
const cloudTex=(()=>{
  const c=document.createElement('canvas'); c.width=256; c.height=128;
  const g=c.getContext('2d');
  const puff=(x,y,r)=>{const gr=g.createRadialGradient(x,y,r*0.2,x,y,r);
    gr.addColorStop(0,'rgba(255,255,255,0.95)');gr.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle=gr;g.beginPath();g.arc(x,y,r,0,TAU);g.fill();};
  puff(80,80,44);puff(128,66,52);puff(176,82,42);puff(120,92,40);
  return new THREE.CanvasTexture(c);
})();
const clouds=new THREE.Group();
for(let i=0;i<9;i++){
  const m=new THREE.Sprite(new THREE.SpriteMaterial({map:cloudTex,transparent:true,opacity:0.9,fog:false,depthWrite:false}));
  const a=i/9*TAU+hash2(i,3)*0.6, r=310+hash2(i,7)*130;
  m.position.set(Math.sin(a)*r, 62+hash2(i,11)*55, Math.cos(a)*r);
  const s=55+hash2(i,5)*70; m.scale.set(s,s*0.45,1);
  clouds.add(m);
}
scene.add(clouds);

/* ground: flat base with soft GO-style patchwork, world-anchored texture */
const groundTex=(()=>{
  const c=document.createElement('canvas'); c.width=c.height=256;
  const g=c.getContext('2d');
  g.fillStyle='#8bd57e'; g.fillRect(0,0,256,256);
  const cols=['#95dd86','#7fce8e','#9ce28c','#86d59b','#90da7f'];
  for(let i=0;i<40;i++){ // soft rounded parcels, not hard squares
    g.fillStyle=cols[i%5]; g.globalAlpha=0.5;
    const x=hash2(i,3)*256, y=hash2(i,4)*256;
    const rx=14+hash2(i,1)*34, ry=14+hash2(i,2)*34;
    g.beginPath(); g.ellipse(x,y,rx,ry,hash2(i,6)*Math.PI,0,TAU); g.fill();
    // wrap the pattern at the edges so tiling has no seams
    g.beginPath(); g.ellipse(x-256,y,rx,ry,hash2(i,6)*Math.PI,0,TAU); g.fill();
    g.beginPath(); g.ellipse(x,y-256,rx,ry,hash2(i,6)*Math.PI,0,TAU); g.fill();
    g.beginPath(); g.ellipse(x-256,y-256,rx,ry,hash2(i,6)*Math.PI,0,TAU); g.fill();
  }
  g.globalAlpha=1;
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(12,12);
  return t;
})();
const GROUND_PERIOD=512; // metres per texture tile — plane snaps to this so the pattern never slides
const ground=new THREE.Mesh(
  new THREE.PlaneGeometry(GROUND_PERIOD*12,GROUND_PERIOD*12),
  new THREE.MeshBasicMaterial({map:groundTex})
);
ground.rotation.x=-Math.PI/2; scene.add(ground);

/* OSM tile fetch + build */
const OSM_TILE=700;      // metres per fetch cell
const osmTiles=new Map();
const waterSpots=[];
const OVERPASS=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter'];
let overpassIdx=0;
const ROAD_W={motorway:[15,11],trunk:[15,11],primary:[12,8.5],secondary:[10,7],
  tertiary:[8.5,6],residential:[7,4.8],unclassified:[7,4.8],living_street:[7,4.8],
  service:[5,3.2],pedestrian:[6,4],footway:[3.6,2.2],path:[3.6,2.2],cycleway:[3.6,2.2],steps:[3.6,2.2],track:[4.5,3]};
const LAYER_H={green:0.02,water:0.035,building:0.05,roadCase:0.065,road:0.08};

function ribbon(pts,w,h,out){
  const hw=w/2;
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i], b=pts[i+1];
    let dx=b.x-a.x, dz=b.z-a.z; const L=Math.hypot(dx,dz)||1; dx/=L; dz/=L;
    const nx=-dz*hw, nz=dx*hw;
    out.push(a.x+nx,h,a.z+nz, b.x+nx,h,b.z+nz, b.x-nx,h,b.z-nz,
             a.x+nx,h,a.z+nz, b.x-nx,h,b.z-nz, a.x-nx,h,a.z-nz);
  }
  // round joints where the line bends (and endpoints), so corners aren't gappy
  for(let i=0;i<pts.length;i++){
    if(i>0&&i<pts.length-1){
      const p0=pts[i-1],p1=pts[i],p2=pts[i+1];
      const a1=Math.atan2(p1.x-p0.x,p1.z-p0.z), a2=Math.atan2(p2.x-p1.x,p2.z-p1.z);
      let da=Math.abs(a1-a2); if(da>Math.PI)da=TAU-da;
      if(da<0.15) continue;
    }
    const p=pts[i], S=8;
    for(let k=0;k<S;k++){
      const b1=k/S*TAU, b2=(k+1)/S*TAU;
      out.push(p.x,h,p.z, p.x+Math.cos(b1)*hw,h,p.z+Math.sin(b1)*hw, p.x+Math.cos(b2)*hw,h,p.z+Math.sin(b2)*hw);
    }
  }
}
function polyTris(pts,h,out){
  if(pts.length<3)return;
  const shape=new THREE.Shape();
  shape.moveTo(pts[0].x,pts[0].z);
  for(let i=1;i<pts.length;i++)shape.lineTo(pts[i].x,pts[i].z);
  const geo=new THREE.ShapeGeometry(shape);
  const pos=geo.attributes.position.array, idx=geo.index.array;
  for(let i=0;i<idx.length;i++){
    const j=idx[i]*3;
    out.push(pos[j],h,pos[j+1]); // ShapeGeometry xy → world xz
  }
  geo.dispose();
}
function meshFromTris(arr,color){
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(arr),3));
  return new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color,side:THREE.DoubleSide}));
}

function buildOsmTile(json,key){
  const tris={green:[],water:[],building:[],roadCase:[],road:[]};
  const spots=[];
  let buildings=0;
  for(const el of (json.elements||[])){
    if(el.type!=='way'||!el.geometry||!el.tags)continue;
    const pts=el.geometry.map(g=>llToLocal(g.lat,g.lon));
    const t=el.tags;
    if(t.highway){
      const closed=el.geometry.length>3 &&
        el.geometry[0].lat===el.geometry[el.geometry.length-1].lat &&
        el.geometry[0].lon===el.geometry[el.geometry.length-1].lon;
      if(closed && (t.area==='yes'||t.highway==='pedestrian')){
        polyTris(pts,LAYER_H.road,tris.road); // plazas etc. — fill, don't outline
      } else {
        const w=ROAD_W[t.highway]||ROAD_W.residential;
        ribbon(pts,w[0],LAYER_H.roadCase,tris.roadCase);
        ribbon(pts,w[1],LAYER_H.road,tris.road);
      }
    } else if(t.natural==='water'||/^(riverbank|dock|canal)$/.test(t.waterway||'')){
      polyTris(pts,LAYER_H.water,tris.water);
      let cx=0,cz=0; pts.forEach(p=>{cx+=p.x;cz+=p.z;}); cx/=pts.length; cz/=pts.length;
      const r=Math.max(...pts.map(p=>Math.hypot(p.x-cx,p.z-cz)));
      spots.push({x:cx,z:cz,r});
    } else if(t.building){
      if(++buildings<=1500) polyTris(pts,LAYER_H.building,tris.building);
    } else if(t.landuse||t.leisure){
      const dark=/forest|orchard|nature_reserve/.test((t.landuse||'')+(t.leisure||''));
      polyTris(pts,LAYER_H.green,tris.green);
      if(dark){/* forests drawn same layer, darker via second mesh below */}
    }
  }
  const grp=new THREE.Group();
  if(tris.green.length)grp.add(meshFromTris(tris.green,WORLD_COL.green));
  if(tris.water.length)grp.add(meshFromTris(tris.water,WORLD_COL.water));
  if(tris.building.length)grp.add(meshFromTris(tris.building,WORLD_COL.building));
  if(tris.roadCase.length)grp.add(meshFromTris(tris.roadCase,WORLD_COL.roadCase));
  if(tris.road.length)grp.add(meshFromTris(tris.road,WORLD_COL.road));
  scene.add(grp);
  waterSpots.push(...spots.map(s=>({...s,tile:key})));
  return {grp};
}
function disposeTile(key,t){
  scene.remove(t.grp);
  t.grp.traverse(o=>{if(o.geometry)o.geometry.dispose(); if(o.material)o.material.dispose();});
  for(let i=waterSpots.length-1;i>=0;i--)if(waterSpots[i].tile===key)waterSpots.splice(i,1);
  osmTiles.delete(key);
}
function isWaterNear(x,z){
  return waterSpots.some(s=>Math.hypot(s.x-x,s.z-z)<s.r+50);
}
/* Overpass allows ~2 concurrent requests — queue tiles, nearest first, retry with backoff */
const tileQueue=[]; let tileActive=0;
function loadTile(cx,cz){
  const key=cx+','+cz;
  if(osmTiles.has(key))return;
  osmTiles.set(key,'queued');
  tileQueue.push({cx,cz,key,tries:0,gen:anchorGen});
  pumpTiles();
}
function pumpTiles(){
  while(tileActive<2&&tileQueue.length){
    const px=avatar.position.x/OSM_TILE-0.5, pz=avatar.position.z/OSM_TILE-0.5;
    tileQueue.sort((a,b)=>Math.hypot(a.cx-px,a.cz-pz)-Math.hypot(b.cx-px,b.cz-pz));
    fetchTile(tileQueue.shift());
  }
}
async function fetchTile(job){
  const {cx,cz,key}=job;
  if(job.gen!==anchorGen||osmTiles.get(key)!=='queued'){pumpTiles();return;}
  tileActive++;
  osmTiles.set(key,'loading');
  const a=localToLatLng(cx*OSM_TILE,(cz+1)*OSM_TILE), b=localToLatLng((cx+1)*OSM_TILE,cz*OSM_TILE);
  const bbox=`${Math.min(a.lat,b.lat)},${Math.min(a.lng,b.lng)},${Math.max(a.lat,b.lat)},${Math.max(a.lng,b.lng)}`;
  const q=`[out:json][timeout:25][bbox:${bbox}];(way["highway"];way["natural"="water"];way["waterway"~"^(riverbank|dock|canal)$"];way["landuse"~"^(grass|forest|meadow|recreation_ground|village_green|orchard|farmland|cemetery)$"];way["leisure"~"^(park|garden|pitch|playground|golf_course|nature_reserve)$"];way["building"];);out geom qt;`;
  try{
    const r=await fetch(OVERPASS[overpassIdx%OVERPASS.length],{method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'data='+encodeURIComponent(q)});
    if(!r.ok)throw new Error('overpass '+r.status);
    const json=await r.json();
    if(job.gen===anchorGen&&osmTiles.get(key)==='loading') osmTiles.set(key,buildOsmTile(json,key));
  }catch(err){
    overpassIdx++; // rotate to the mirror
    if(osmTiles.get(key)==='loading'){
      if(++job.tries<6){
        osmTiles.set(key,'queued');
        setTimeout(()=>{ if(osmTiles.get(key)==='queued'){tileQueue.push(job);pumpTiles();} }, 1500*job.tries);
      } else osmTiles.delete(key);
    }
  }finally{
    tileActive--; pumpTiles();
  }
}
function setWorldAnchor(lat,lng){
  if(Math.hypot(lat-worldAnchor.lat,lng-worldAnchor.lng)<1e-6)return;
  worldAnchor={lat,lng}; anchorGen++;
  for(const [key,t] of [...osmTiles]){
    if(t&&t.grp)disposeTile(key,t); else osmTiles.delete(key);
  }
  waterSpots.length=0;
}
function updateChunks(){
  const p=avatar.position;
  sky.position.set(p.x,0,p.z);
  clouds.position.set(p.x,0,p.z);
  clouds.rotation.y=performance.now()*0.000012;
  ground.position.set(Math.round(p.x/GROUND_PERIOD)*GROUND_PERIOD,0,Math.round(p.z/GROUND_PERIOD)*GROUND_PERIOD);
  const tx=Math.floor(p.x/OSM_TILE), tz=Math.floor(p.z/OSM_TILE);
  for(let dx=-1;dx<=1;dx++)for(let dz=-1;dz<=1;dz++)loadTile(tx+dx,tz+dz);
  for(const [key,t] of osmTiles){
    if(!t||!t.grp)continue;
    const [cx,cz]=key.split(',').map(Number);
    if(Math.abs(cx-tx)>2||Math.abs(cz-tz)>2)disposeTile(key,t);
  }
}

const cam = {yaw:0, dist:18, pitch:0.72, autoFollow:true, lastManual:0};
function applyCamera(dt){
  const targetY=4.2; // look above the avatar → avatar sits low on screen, horizon + sky visible (GO framing)

const move = {
  gpsOn:false, watchId:null, origin:null,   // {lat,lng}
  target:new THREE.Vector3(24,0,24),        // where GPS says we are
  heading:0, lastFix:null, speedEst:0,
};
avatar.position.copy(move.target);

function latLngToLocal(lat,lng){
  const o=move.origin;
  const x=(lng-o.lng)*Math.cos(o.lat*Math.PI/180)*111320;
  const z=-(lat-o.lat)*110540;
  return {x:x+24, z:z+24};
}
const gpsDot=document.getElementById('gpsDot'), gpsTxt=document.getElementById('gpsTxt');
const gpsDiag=document.getElementById('gpsDiag');
const gpsStats={fixes:0, lastAcc:null, movedM:0, lastAt:0, permState:'unknown'};
function setGpsUI(state,label){ gpsDot.className=state; gpsTxt.textContent=label; }

function envIssues(){
  const issues=[];
  if(!('geolocation' in navigator)) issues.push('✗ No geolocation API in this browser/webview');
  if(!window.isSecureContext) issues.push('✗ Not HTTPS — browsers block GPS on insecure pages');
  try{ if(window.self!==window.top) issues.push('✗ Embedded in a frame (e.g. artifact preview) — GPS is blocked here. Host the file and open it full-screen in Safari/Chrome'); }
  catch(e){ issues.push('✗ Cross-origin frame detected — GPS blocked. Open full-screen in a real browser'); }
  return issues;
}
function renderDiag(){
  const issues=envIssues();
  const lines=[
    `secure context: ${window.isSecureContext?'✓':'✗'}`,
    `permission: ${gpsStats.permState}`,
    `fixes received: ${gpsStats.fixes}`,
    `accuracy: ${gpsStats.lastAcc==null?'—':'±'+Math.round(gpsStats.lastAcc)+'m'}`,
    `distance walked: ${Math.round(gpsStats.movedM)}m`,
    `last fix: ${gpsStats.lastAt?Math.round((performance.now()-gpsStats.lastAt)/1000)+'s ago':'—'}`,
    `watch restarts: ${gpsStats.restarts||0}`,
  ];
  gpsDiag.style.display='block';
  gpsDiag.textContent=(issues.length?issues.join('\n')+'\n':'')+lines.join('\n');
}
setInterval(()=>{ if(gpsDiag.style.display==='block') renderDiag(); }, 1000);

let wakeLock=null;
async function keepAwake(){
  try{ if('wakeLock' in navigator){ wakeLock=await navigator.wakeLock.request('screen'); } }catch(e){}
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState!=='visible') return;
  if(move.watchId!=null) beginWatch(); // stalled-watch recovery after screen-lock/app-switch
  if(move.gpsOn) keepAwake();
});

let impreciseWarned=false;
function onGpsFix(fix){
  const {latitude:lat, longitude:lng, accuracy} = fix.coords;
  gpsStats.fixes++; gpsStats.lastAcc=accuracy; gpsStats.lastAt=performance.now();
  if(!move.origin){
    move.origin={lat,lng};
    setWorldAnchor(lat,lng); // rebuild the street map around the player's real location
    keepAwake();
    toast(`GPS locked (±${Math.round(accuracy)}m). Walk in the real world to move!`, 3200);
  }
  if(accuracy>150){
    setGpsUI('wait',`GPS: imprecise ±${Math.round(accuracy)}m`);
    if(!impreciseWarned){
      impreciseWarned=true;
      toast('Location is very imprecise — walking won\'t register. Enable Precise Location for your browser (Settings → Privacy → Location Services) and move outdoors.', 5600);
    }
  } else if(accuracy>80){ setGpsUI('wait',`GPS: weak ±${Math.round(accuracy)}m`); }
  else { setGpsUI('live',`GPS: live ±${Math.round(accuracy)}m`); }
  const p=latLngToLocal(lat,lng);
  // bearing + walked distance from previous fix
  if(move.lastFix){
    const dx=p.x-move.lastFix.x, dz=p.z-move.lastFix.z, d=Math.hypot(dx,dz);
    gpsStats.movedM+=d;
    if(d>1.2){ move.heading=Math.atan2(dx,dz); move.speedEst=d; }
  }
  move.lastFix=p;
  move.target.set(p.x,0,p.z);
  move.gpsOn=true;
  renderDiag();
}
function onGpsErr(err){
  move.gpsOn=false;
  gpsStats.permState = err.code===1 ? 'denied' : gpsStats.permState;
  setGpsUI('err', err.code===1?'GPS: denied':err.code===3?'GPS: timeout':'GPS: unavailable');
  toast(err.code===1
    ? 'Location denied. Allow it in browser/site settings, enable Precise Location, then tap the pill again.'
    : err.code===3
    ? 'GPS timed out — move outdoors / near a window and tap the pill to retry.'
    : 'Position unavailable — check that Location Services are on for this browser.', 4600);
  renderDiag();
}
// (re)register the position watch; keeps move.origin so the world doesn't re-anchor
function beginWatch(){
  if(move.watchId!=null) navigator.geolocation.clearWatch(move.watchId);
  move.watchId = navigator.geolocation.watchPosition(onGpsFix, onGpsErr,
    {enableHighAccuracy:true, maximumAge:1000, timeout:20000});
}
async function startGPS(){
  const issues=envIssues();
  if('permissions' in navigator && navigator.permissions.query){
    try{ const p=await navigator.permissions.query({name:'geolocation'});
      gpsStats.permState=p.state;
      p.onchange=()=>{ gpsStats.permState=p.state; };
    }catch(e){}
  }
  renderDiag();
  if(issues.length){
    setGpsUI('err','GPS: blocked');
    toast(issues[0].replace('✗ ',''), 4200);
    if(!('geolocation' in navigator)) return; // truly nothing to try
  } else {

}
// Phones silently stall a geolocation watch after screen-lock/backgrounding —
// no error fires, fixes just stop. Watchdog: no fix for 15s while visible → re-register.
setInterval(()=>{

  if(gpsStats.lastAt && performance.now()-gpsStats.lastAt>15000){
    gpsStats.restarts=(gpsStats.restarts||0)+1;
    setGpsUI('wait','GPS: reconnecting…');
    beginWatch();
  }
}, 5000);
function stopGPS(){
  if(move.watchId!=null) navigator.geolocation.clearWatch(move.watchId);

document.getElementById('gpsPill').addEventListener('click', ()=>{

  // watch keeps its id, and tapping should RETRY, not toggle off dead GPS
  if(move.watchId!=null && move.gpsOn){ stopGPS(); toast('GPS off — joystick mode.'); }

// otherwise wait for the pill tap and show why.

  startGPS();
} else {

}

/* joystick */
const joy={active:false,dx:0,dy:0,id:null};
const joyEl=document.getElementById('joy'), knob=document.getElementById('knob');
function joyMove(cx,cy){
  const r=joyEl.getBoundingClientRect();
  const ox=cx-(r.left+r.width/2), oy=cy-(r.top+r.height/2);
  const m=Math.hypot(ox,oy), max=r.width/2-8, k=m>max?max/m:1;
  joy.dx=ox*k/max; joy.dy=oy*k/max;
  knob.style.transform=`translate(calc(-50% + ${ox*k}px), calc(-50% + ${oy*k}px))`;
}
joyEl.addEventListener('pointerdown',e=>{joy.active=true;joy.id=e.pointerId;joyEl.setPointerCapture(e.pointerId);joyMove(e.clientX,e.clientY);});
joyEl.addEventListener('pointermove',e=>{if(joy.active&&e.pointerId===joy.id)joyMove(e.clientX,e.clientY);});
function joyEnd(e){if(e.pointerId===joy.id){joy.active=false;joy.dx=joy.dy=0;knob.style.transform='translate(-50%,-50%)';}}
joyEl.addEventListener('pointerup',joyEnd); joyEl.addEventListener('pointercancel',joyEnd);
const keys={};
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

let walkPhase=0;
function updateMovement(dt,now){
  let moving=false, moveHeading=avatar.rotation.y;

  // joystick / keys always work (relative to camera yaw)
  let jx=joy.dx, jy=joy.dy;
  if(keys['w']||keys['arrowup'])jy=-1;
  if(keys['s']||keys['arrowdown'])jy=1;
  if(keys['a']||keys['arrowleft'])jx=-1;
  if(keys['d']||keys['arrowright'])jx=1;
  const jm=Math.hypot(jx,jy);
  const stickActive=jm>0.12;
  if(stickActive){
    const speed=4.5; // m/s brisk walk
    const ang=Math.atan2(-jx,-jy)+cam.yaw+Math.PI; // camera-relative: up=away from camera, right=screen right
    const mag=speed*(jm>1?1:jm);
    // direct control: move the avatar itself, no glide lag
    avatar.position.x+=Math.sin(ang)*mag*dt;
    avatar.position.z+=Math.cos(ang)*mag*dt;
    move.target.set(avatar.position.x,0,avatar.position.z); // keep GPS target in sync so nothing drifts after release
    moveHeading=ang; moving=true;
  } else {
    // glide the avatar toward the GPS target (GO-style drift, GPS fixes only)
    const dx=move.target.x-avatar.position.x, dz=move.target.z-avatar.position.z;
    const d=Math.hypot(dx,dz);
    if(d>0.08){
      const step=Math.min(d, Math.max(d*6*dt, 1.2*dt));
      avatar.position.x+=dx/d*step; avatar.position.z+=dz/d*step;
      moveHeading=Math.atan2(dx,dz);
      moving=true;
    }
    // teleport snap if GPS jumped very far (drove / bad fix)
    if(d>120){ avatar.position.x=move.target.x; avatar.position.z=move.target.z; }
  }

  // face heading + locomotion animation
  if(moving){
    let a=moveHeading-avatar.rotation.y;
    while(a>Math.PI)a-=TAU; while(a<-Math.PI)a+=TAU;
    avatar.rotation.y+=a*Math.min(1,16*dt);
    if(animMixer){ setAnim(stickActive?'run':'walk'); }
    else if(avatar.userData.legL){
      walkPhase+=dt*9;
      avatar.userData.legL.rotation.x=Math.sin(walkPhase)*0.7;
      avatar.userData.legR.rotation.x=-Math.sin(walkPhase)*0.7;
      avatar.position.y=Math.abs(Math.sin(walkPhase))*0.05;
    }
    // auto-rotate camera behind walking direction (GPS walks only —
    // rotating mid-steer would warp the stick's frame of reference)
    if(cam.autoFollow && !stickActive && now-cam.lastManual>4000){
      let ca=moveHeading+Math.PI-cam.yaw;
      while(ca>Math.PI)ca-=TAU; while(ca<-Math.PI)ca+=TAU;
      cam.yaw+=ca*Math.min(1,1.6*dt);
    }
  } else {
    if(animMixer){ setAnim('idle'); }
    else if(avatar.userData.legL){
      avatar.userData.legL.rotation.x*=0.85;
      avatar.userData.legR.rotation.x*=0.85;
      avatar.position.y*=0.85;
    }
  }
  if(animMixer)animMixer.update(dt);
  ringMesh.position.x=avatar.position.x; ringMesh.position.z=avatar.position.z;
}

/* ---------------- camera drag / pinch / wheel ---------------- */
const drag={id:null,x:0,y:0,moved:0,t:0, pinch:null};
glCv.addEventListener('pointerdown',e=>{
  if(game.screen!=='map')return;
  if(drag.id===null){ drag.id=e.pointerId; drag.x=e.clientX; drag.y=e.clientY; drag.moved=0; drag.t=performance.now(); }
  else if(drag.pinch===null){ drag.pinch={id:e.pointerId,x:e.clientX,y:e.clientY}; }
});
glCv.addEventListener('pointermove',e=>{
  if(game.screen!=='map')return;
  if(drag.pinch && (e.pointerId===drag.id || e.pointerId===drag.pinch.id)){
    // pinch zoom
    if(e.pointerId===drag.id){drag.x=e.clientX;drag.y=e.clientY;}
    else {drag.pinch.x=e.clientX;drag.pinch.y=e.clientY;}
    const dNow=Math.hypot(drag.x-drag.pinch.x, drag.y-drag.pinch.y);
    if(drag.pinch.last){ cam.dist=clamp(cam.dist*(drag.pinch.last/dNow),8,32); }
    drag.pinch.last=dNow;
    drag.moved=99;
    return;
  }
  if(e.pointerId===drag.id){
    const ddx=e.clientX-drag.x, ddy=e.clientY-drag.y;
    drag.moved+=Math.abs(ddx)+Math.abs(ddy);
    if(drag.moved>6){
      cam.yaw-=ddx*0.006;
      cam.pitch=clamp(cam.pitch-ddy*0.004, 0.25, 1.15);
      cam.lastManual=performance.now();
    }
    drag.x=e.clientX; drag.y=e.clientY;
  }
});
function dragEnd(e){
  if(e.pointerId===drag.id){
    if(drag.moved<8 && performance.now()-drag.t<450) tap3D(e.clientX,e.clientY);
    drag.id=null; drag.pinch=null;
  }
  if(drag.pinch && e.pointerId===drag.pinch.id) drag.pinch=null;
}
glCv.addEventListener('pointerup',dragEnd);
glCv.addEventListener('pointercancel',dragEnd);
glCv.addEventListener('wheel',e=>{ cam.dist=clamp(cam.dist+e.deltaY*0.02,8,32); },{passive:true});

/* ---------------- spawns (3D billboards) ---------------- */
const MAX_SPAWNS=10;
let lastSpawnAt=0;
const spTextures={};
SPECIES.forEach(sp=>spTextures[sp.id]=creatureTexture(sp));

function weightedSpecies(nearWater){
  const pool=SPECIES.filter(sp=> sp.biome==='water' ? nearWater : true);
  const total=pool.reduce((a,sp)=>a+RARITY_W[sp.rarity],0);
  let r=Math.random()*total;
  for(const sp of pool){ r-=RARITY_W[sp.rarity]; if(r<=0)return sp; }
  return pool[0];
}
function trySpawn(now){
  if(game.spawns.length>=MAX_SPAWNS) return;
  if(now-lastSpawnAt<2400) return;
  lastSpawnAt=now;
  const a=Math.random()*TAU, d=rand(25,90);
  const x=avatar.position.x+Math.sin(a)*d, z=avatar.position.z+Math.cos(a)*d;
  const sp=weightedSpecies(isWaterNear(x,z));
  const cp=Math.round(rand(sp.cp[0],sp.cp[1]));
  const mat=new THREE.SpriteMaterial({map:spTextures[sp.id],transparent:true});
  const sprite=new THREE.Sprite(mat);
  const sz=2.6;
  sprite.scale.set(sz,sz,1); sprite.center.set(0.5,0.08);
  const grp=new THREE.Group();
  grp.add(sprite); grp.add(makeShadow(2.2));
  // tap ring (visible when in range)
  const tr=new THREE.Mesh(new THREE.RingGeometry(1.4,1.7,40),
    new THREE.MeshBasicMaterial({color:0xff6b5e,transparent:true,opacity:0.85,side:THREE.DoubleSide}));
  tr.rotation.x=-Math.PI/2; tr.position.y=0.1; tr.visible=false;
  grp.add(tr);
  grp.position.set(x,0,z);
  scene.add(grp);
  game.spawns.push({sp,cp,x,z,born:now,ttl:rand(45000,110000),grp,sprite,tr,phase:Math.random()*TAU});
  if(!game.seen[sp.id]) game.seen[sp.id]=1;
}
function updateSpawns(now,dt){
  game.spawns=game.spawns.filter(s=>{
    const gone=(now-s.born)>s.ttl || dist2(s.x,s.z,avatar.position.x,avatar.position.z)>260;
    if(gone){ scene.remove(s.grp); return false; }
    const t=now/1000+s.phase;
    s.sprite.position.y=Math.abs(Math.sin(t*2.2))*0.5;
    const inR=dist2(s.x,s.z,avatar.position.x,avatar.position.z)<=INTERACT_RANGE;
    s.tr.visible=inR;
    if(inR) s.tr.scale.setScalar(1+Math.sin(now/220)*0.08);
    return true;
  });
}

/* ---------------- tap → raycast → encounter/spin ---------------- */
const raycaster=new THREE.Raycaster();
function tap3D(px,py){
  const ndc=new THREE.Vector2(px/window.innerWidth*2-1, -(py/window.innerHeight)*2+1);
  raycaster.setFromCamera(ndc,camera);
  // creatures
  const hits=raycaster.intersectObjects(game.spawns.map(s=>s.sprite));
  if(hits.length){
    const s=game.spawns.find(sp=>sp.sprite===hits[0].object);
    if(dist2(s.x,s.z,avatar.position.x,avatar.position.z)<=INTERACT_RANGE) startEncounter(s);
    else toast(`${s.sp.name} is too far — walk closer!`);
    return;
  }
}

/* ================= ENCOUNTER (2D overlay, GO catch screen) ================= */
const encCv=document.getElementById('encCv');
const ectx=encCv.getContext('2d');
let EW=0,EH=0;
function sizeEncCv(){
  const DPR=Math.min(window.devicePixelRatio||1,2);
  EW=window.innerWidth; EH=window.innerHeight;
  encCv.width=EW*DPR; encCv.height=EH*DPR;
  ectx.setTransform(DPR,0,0,DPR,0,0);
}
const enc={active:false,spawn:null,cx:0,cy:0,wanderT:0,hop:0,hopV:0,ringPhase:0,
  ball:null,ballState:'ready',shake:{},drag:null,msg:'',msgUntil:0,attackT:0};
const encUI=document.getElementById('encUI');
const encTop=document.getElementById('encTop');
const ballBtnLbl=document.getElementById('ballBtnLbl');

function startEncounter(spawn){
  game.screen='encounter'; enc.active=true; enc.spawn=spawn;
  enc.cx=EW/2; enc.cy=EH*0.42; enc.wanderT=0; enc.hop=0; enc.hopV=0;
  enc.ringPhase=Math.random()*TAU; enc.ball=null; enc.ballState='ready';
  enc.msg=''; enc.attackT=0;
  encUI.classList.add('on'); encCv.style.display='block';
  document.getElementById('joy').style.display='none';
  encTop.textContent=`Wild ${spawn.sp.name} · CP ${spawn.cp}`;
  updateBallBtn();
}
function endEncounter(removeSpawn){
  enc.active=false; game.screen='map';
  encUI.classList.remove('on'); encCv.style.display='none';
  document.getElementById('joy').style.display='block';
  if(removeSpawn && enc.spawn){
    scene.remove(enc.spawn.grp);
    const i=game.spawns.indexOf(enc.spawn);
    if(i>=0)game.spawns.splice(i,1);
  }
  enc.spawn=null;
}
function updateBallBtn(){
  ballBtnLbl.textContent=`×${game.balls[game.selBall]}`;
  document.getElementById('ballBtn').querySelector('em').style.color=BALLS[game.selBall].color;
}
document.getElementById('ballBtn').addEventListener('click',()=>{
  const i=game.ballOrder.indexOf(game.selBall);
  game.selBall=game.ballOrder[(i+1)%game.ballOrder.length];
  toast(`${BALLS[game.selBall].name} selected (${BALLS[game.selBall].mult}× catch)`);
  updateBallBtn();
});
document.getElementById('runBtn').addEventListener('click',()=>{
  if(enc.active&&enc.ballState!=='flying'&&enc.ballState!=='shaking'){
    toast('You fled the encounter.'); endEncounter(false);
  }
});

encCv.addEventListener('pointerdown',e=>{
  if(enc.ballState!=='ready')return;
  const bx=EW/2, by=EH-95;
  if(Math.hypot(e.clientX-bx,e.clientY-by)<90){
    enc.drag={pts:[{x:e.clientX,y:e.clientY,t:performance.now()}]};
    encCv.setPointerCapture(e.pointerId);
  }
});
encCv.addEventListener('pointermove',e=>{
  if(enc.drag){
    enc.drag.pts.push({x:e.clientX,y:e.clientY,t:performance.now()});
    if(enc.drag.pts.length>40)enc.drag.pts.shift();
  }
});
encCv.addEventListener('pointerup',()=>{
  if(!enc.drag)return;
  const pts=enc.drag.pts; enc.drag=null;
  if(pts.length<3)return;
  const now=performance.now();
  let i=pts.length-1,j=i;
  while(j>0&&now-pts[j].t<90)j--;
  const p1=pts[j],p2=pts[i],dt=Math.max(16,p2.t-p1.t);
  const vx=(p2.x-p1.x)/dt, vy=(p2.y-p1.y)/dt;
  if(vy>-0.25)return;
  throwBall(vx,vy);
});
function throwBall(vx,vy){
  if(game.balls[game.selBall]<=0){
    game.balls[game.selBall]+=12; // waystones removed — restock automatically
    toast(`${BALLS[game.selBall].name}s restocked +12`);
    updateBallBtn();
  }
  game.balls[game.selBall]--; updateBallBtn();
  const power=clamp(-vy,0.25,2.4), reach=power/2.0;
  const sx=EW/2, sy=EH-95;
  const ly=lerp(sy-40,enc.cy+34,clamp(reach,0,1))-Math.max(0,reach-1)*140;
  const lx=sx+vx*260;
  enc.ball={sx,sy,lx,ly,t:0,duration:620,peak:140+power*60,reach};
  enc.ballState='flying';
}
function ringFraction(){ return 0.5+0.5*Math.sin(enc.ringPhase); }
function resolveThrow(){
  const b=enc.ball, sp=enc.spawn.sp, hitR=52;
  const hit=b.reach>0.55&&b.reach<1.25&&Math.hypot(b.lx-enc.cx,b.ly-(enc.cy+6))<hitR;
  if(!hit){
    enc.ballState='gone';
    enc.msg=pick(['Missed!','So close!','It dodged!']); enc.msgUntil=performance.now()+1200;
    setTimeout(()=>{if(enc.active&&enc.ballState==='gone')enc.ballState='ready';},650);
    return;
  }
  const f=ringFraction();
  let bonus=1.0,label='Hit';
  if(f<=0.35){bonus=1.7;label='Excellent!';}
  else if(f<=0.6){bonus=1.5;label='Great!';}
  else if(f<=0.85){bonus=1.3;label='Nice!';}
  const prob=clamp(sp.catchRate*BALLS[game.selBall].mult*bonus,0.02,0.95);
  const success=Math.random()<prob;
  enc.shake={count:0,total:success?3:1+Math.floor(Math.random()*2),t:0,result:success,bonusLabel:label,prob};
  enc.ballState='shaking';
  enc.msg=label; enc.msgUntil=performance.now()+1100;
}
function finishCatch(){
  const sp=enc.spawn.sp;
  if(enc.shake.result){
    game.caught[sp.id]=(game.caught[sp.id]||0)+1;
    const newDex=game.caught[sp.id]===1;
    const bonusXP=enc.shake.bonusLabel==='Excellent!'?100:enc.shake.bonusLabel==='Great!'?50:enc.shake.bonusLabel==='Nice!'?20:0;
    game.dust+=100;
    grantXP(150+bonusXP+(newDex?500:0));
    toast(`Gotcha! ${sp.name} caught! +${150+bonusXP+(newDex?500:0)} XP · +100 ✦${newDex?' · New Codex entry!':''}`,3000);
    endEncounter(true);
  } else {
    enc.ballState='ready';
    if(Math.random()<sp.fleeRate){
      toast(`Oh no — the wild ${sp.name} fled!`,2600); endEncounter(true);
    } else { enc.msg='It broke free!'; enc.msgUntil=performance.now()+1400; }
  }
}
function drawBall2D(x,y,r,color,rot){
  ectx.save(); ectx.translate(x,y); if(rot)ectx.rotate(rot);
  ectx.lineWidth=Math.max(2,r*0.12); ectx.strokeStyle='#12303a'; ectx.fillStyle=color;
  ectx.beginPath(); ectx.arc(0,0,r,Math.PI,0); ectx.fill();
  ectx.fillStyle='#fdf8ee'; ectx.beginPath(); ectx.arc(0,0,r,0,Math.PI); ectx.fill();
  ectx.beginPath(); ectx.arc(0,0,r,0,TAU); ectx.stroke();
  ectx.beginPath(); ectx.moveTo(-r,0); ectx.lineTo(r,0); ectx.stroke();
  ectx.fillStyle='#fdf8ee'; ectx.beginPath(); ectx.arc(0,0,r*0.28,0,TAU); ectx.fill(); ectx.stroke();
  ectx.restore();
}
function drawEncounter(now,dt){
  const sp=enc.spawn.sp;
  enc.wanderT+=dt; enc.ringPhase+=dt*2.1;
  enc.cx=EW/2+Math.sin(enc.wanderT*0.7+1)*EW*0.14+Math.sin(enc.wanderT*1.7)*14;
  enc.attackT-=dt;
  if(enc.attackT<=0&&Math.random()<0.004)enc.attackT=0.9;
  if(enc.hop<=0&&Math.random()<0.01)enc.hopV=260;
  enc.hopV-=900*dt; enc.hop=Math.max(0,enc.hop+enc.hopV*dt);
  if(enc.hop===0)enc.hopV=Math.max(enc.hopV,0);

  const grad=ectx.createLinearGradient(0,0,0,EH);
  const sky=sp.biome==='water'?['#8fd4e8','#d3eef2','#79b88a']:['#a8dbea','#e7f2d8','#8fd07a'];
  grad.addColorStop(0,sky[0]);grad.addColorStop(0.55,sky[1]);grad.addColorStop(0.56,sky[2]);grad.addColorStop(1,'#6cb85e');
  ectx.fillStyle=grad; ectx.fillRect(0,0,EW,EH);
  ectx.fillStyle='rgba(227,214,189,.8)';
  ectx.beginPath(); ectx.ellipse(EW/2,EH*0.6,EW*0.42,EH*0.11,0,0,TAU); ectx.fill();
  ectx.fillStyle='rgba(255,255,255,.6)';
  ectx.beginPath(); ectx.arc(EW*0.82,EH*0.12,26,0,TAU); ectx.fill();

  const attackScale=enc.attackT>0?1+Math.sin(enc.attackT*Math.PI/0.9)*0.18:1;
  ectx.fillStyle='rgba(18,48,58,.22)';
  ectx.beginPath(); ectx.ellipse(enc.cx,enc.cy+40,44,12,0,0,TAU); ectx.fill();

  const hidden=enc.ballState==='shaking';
  if(!hidden){
    ectx.save(); ectx.translate(enc.cx,enc.cy+40); ectx.scale(attackScale,attackScale);
    drawCreature(ectx,sp,86,now/1000,enc.hop*0.25);
    ectx.restore();
    const R=52,f=ringFraction();
    ectx.lineWidth=3; ectx.strokeStyle='rgba(255,255,255,.9)';
    ectx.beginPath(); ectx.arc(enc.cx,enc.cy+6,R,0,TAU); ectx.stroke();
    ectx.strokeStyle=f<=0.35?'#f5b93c':f<=0.6?'#ff8a3c':f<=0.85?'#ff6b5e':'#e05a8a';
    ectx.beginPath(); ectx.arc(enc.cx,enc.cy+6,Math.max(6,R*f),0,TAU); ectx.stroke();
  }

  const ballR=26,bcol=BALLS[game.selBall].color;
  if(enc.ballState==='ready'){
    const bx=EW/2,by=EH-95;
    drawBall2D(bx,by+Math.sin(now/500)*3,ballR,bcol);
    if(enc.drag&&enc.drag.pts.length>1){
      ectx.strokeStyle='rgba(253,248,238,.6)'; ectx.lineWidth=4; ectx.setLineDash([2,8]);
      const p0=enc.drag.pts[0],pl=enc.drag.pts[enc.drag.pts.length-1];
      ectx.beginPath(); ectx.moveTo(bx,by); ectx.lineTo(bx+(pl.x-p0.x),by+(pl.y-p0.y)); ectx.stroke();
      ectx.setLineDash([]);
    }
  } else if(enc.ballState==='flying'){
    const b=enc.ball; b.t+=dt*1000;
    const p=clamp(b.t/b.duration,0,1);
    const x=lerp(b.sx,b.lx,p), y=lerp(b.sy,b.ly,p)-Math.sin(p*Math.PI)*b.peak;
    drawBall2D(x,y,ballR*lerp(1,0.55,p),bcol,p*10);
    if(p>=1){b.finalX=x;b.finalY=y;resolveThrow();}
  } else if(enc.ballState==='shaking'){
    const s=enc.shake; s.t+=dt;
    const per=0.85, idx=Math.floor(s.t/per), ph=(s.t%per)/per;
    const wob=idx<s.total?Math.sin(ph*TAU)*0.35:0;
    ectx.save(); ectx.translate(enc.cx,enc.cy+28); ectx.rotate(wob);
    drawBall2D(0,0,ballR*0.8,bcol); ectx.restore();
    if(idx>s.count)s.count=idx;
    if(s.t>=per*s.total+0.5){
      if(s.result){
        ectx.fillStyle='#f5b93c'; ectx.font='bold 30px "Trebuchet MS"'; ectx.textAlign='center';
        ectx.fillText('✦  ✦  ✦',enc.cx,enc.cy-30);
      }
      finishCatch();
    }
  } else if(enc.ballState==='gone'&&enc.ball){
    const b=enc.ball; b.t+=dt*1000;
    const p=clamp((b.t-b.duration)/400,0,1);
    drawBall2D(b.finalX||b.lx,(b.finalY||b.ly)+p*120,ballR*0.5*(1-p*0.5),bcol);
  }

  if(performance.now()<enc.msgUntil&&enc.msg){
    ectx.fillStyle='#12303a'; ectx.font='bold 26px "Trebuchet MS"'; ectx.textAlign='center';
    ectx.fillText(enc.msg,EW/2,EH*0.2);
  }
}

/* ---------------- main loop ---------------- */
let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  if(game.screen==='map'){
    updateMovement(dt,now);
    updateChunks();
    trySpawn(now);
    updateSpawns(now,dt);
    applyCamera(dt);
    renderer.render(scene,camera);
  } else {
    ectx.clearRect(0,0,EW,EH);
    drawEncounter(now,dt);
  }
  requestAnimationFrame(frame);
}
onResize();
refreshHUD();
toast('Drag to orbit the camera · walk (GPS) or use the joystick · tap creatures in range!',4600);
requestAnimationFrame(frame);
</script>
